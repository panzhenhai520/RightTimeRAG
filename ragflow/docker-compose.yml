# The RAGFlow team do not actively maintain docker-compose-gpu.yml, so use them at your own risk. 
# Pull requests to improve it are welcome.
include:
  # - ./docker-compose-base.yml
  - /home/xsuper/app/ragflow/docker-compose-base.yml
services:
  ragflow:
    image: ${RAGFLOW_IMAGE}
    container_name: ragflow-server
    restart: no
    ports:
      - ${SVR_HTTP_PORT}:9380
      - 8002:80
      - 443:443
    volumes:
      - ./ragflow-logs:/ragflow/logs
      - ./nginx/ragflow.conf:/etc/nginx/conf.d/ragflow.conf
      - ./nginx/proxy.conf:/etc/nginx/proxy.conf
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./history_data_agent:/ragflow/history_data_agent
      - ./service_conf.yaml.template:/ragflow/conf/service_conf.yaml.template
      - ./entrypoint.sh:/ragflow/entrypoint.sh
      - ./app/web/dist/:/ragflow/web/dist/
      - ./app/web/public/:/ragflow/web/public/
      - ./app/server/db_models.py:/ragflow/api/db/db_models.py
      - ./app/server/user_app.py:/ragflow/api/apps/user_app.py
      - ./app/server/user_service.py:/ragflow/api/db/services/user_service.py
      - ./app/server/knowledgebase_service.py:/ragflow/api/db/services/knowledgebase_service.py
      - ./app/server/dialog_app.py:/ragflow/api/apps/dialog_app.py
      - ./app/server/conversation_app.py:/ragflow/api/apps/conversation_app.py
      - ./app/server/api_app.py:/ragflow/api/apps/api_app.py

    env_file: .env
    depends_on:
      - mysql
    environment:
      - TZ=${TIMEZONE}
    networks:
      - ragflow
    # https://docs.docker.com/engine/daemon/prometheus/#create-a-prometheus-configuration
    # If you're using Docker Desktop, the --add-host flag is optional. This flag makes sure that the host's internal IP gets exposed to the Prometheus container.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  custom_server:
    image: registry.cn-hangzhou.aliyuncs.com/try520/rag:custom-server_1.0
    container_name: custom-server
    volumes:
      - ./custom_server/config/config.prod.js:/app/config/config.prod.js
      - ./custom_server/logs:/app/logs
    ports:
      - 3010:80
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ragflow
    depends_on:
      - mysql
    restart: no
